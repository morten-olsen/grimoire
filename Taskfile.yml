version: "3"

tasks:
  build:
    desc: Build all components for the current platform
    cmds:
      - cargo build --workspace --release
      - cmd: |
          echo "Building macOS native prompt..."
          cd native/macos && swift build -c release && cp .build/release/grimoire-prompt-macos ../../target/release/
        platforms: [darwin]
      - cmd: |
          if pkg-config --exists gtk4 libadwaita-1 2>/dev/null; then
            echo "Building Linux native prompt..."
            cd native/linux && cargo build --release && cp target/release/grimoire-prompt-linux ../../target/release/
          fi
        platforms: [linux]

  build-debug:
    desc: Build debug (fast iteration)
    cmds:
      - cargo build --workspace

  test:
    desc: Run all tests
    cmds:
      - cargo test --workspace

  dev:
    desc: Build debug and run service
    cmds:
      - cargo build --workspace
      - cmd: cargo run -p grimoire-service

  install:
    desc: Install all binaries to ~/.cargo/bin
    deps: [build]
    cmds:
      - cargo install --path crates/grimoire-cli --force
      - cargo install --path crates/grimoire-service --force
      - cargo install --path crates/grimoire-prompt --force
      - cmd: |
          if [[ -f native/macos/.build/release/grimoire-prompt-macos ]]; then
            cp native/macos/.build/release/grimoire-prompt-macos ~/.cargo/bin/
            echo "Installed grimoire-prompt-macos"
          fi
        platforms: [darwin]
      - cmd: |
          if [[ -f native/linux/target/release/grimoire-prompt-linux ]]; then
            cp native/linux/target/release/grimoire-prompt-linux ~/.cargo/bin/
            echo "Installed grimoire-prompt-linux"
          fi
        platforms: [linux]
      - ln -sf grimoire ~/.cargo/bin/grim
      - echo "Done. Run 'grimoire service install' to set up auto-start."

  fmt:
    desc: Format all code
    cmds:
      - cargo fmt --all
      - cmd: swift-format format --in-place native/macos/Sources/*.swift 2>/dev/null || true
        platforms: [darwin]

  lint:
    desc: Lint all code
    cmds:
      - cargo clippy --workspace -- -D warnings

  prompt:linux:
    desc: "Debug: run the Linux native prompt (GTK4)"
    cmds:
      - cd native/linux && cargo build
      - native/linux/target/debug/grimoire-prompt-linux {{.CLI_ARGS}}

  prompt:macos:
    desc: "Debug: run the macOS native prompt"
    cmds:
      - cd native/macos && swift build
      - native/macos/.build/debug/grimoire-prompt-macos {{.CLI_ARGS}}

  prompt:generic:
    desc: "Debug: run the generic (zenity/kdialog/osascript) prompt"
    cmds:
      - cargo run -p grimoire-prompt -- {{.CLI_ARGS}}

  clean:
    desc: Clean all build artifacts
    cmds:
      - cargo clean
      - rm -rf native/macos/.build native/linux/target
