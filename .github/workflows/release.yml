name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            native_prompt: linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            native_prompt: linux
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            native_prompt: macos
          - target: aarch64-apple-darwin
            os: macos-latest
            native_prompt: macos

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: cargo install cross --locked

      - name: Install Linux native prompt deps
        if: matrix.native_prompt == 'linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Build workspace
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --workspace --release --target ${{ matrix.target }}
          else
            cargo build --workspace --release --target ${{ matrix.target }}
          fi

      - name: Build native prompt (Linux)
        if: matrix.native_prompt == 'linux' && !matrix.cross
        run: cd native/linux && cargo build --release

      - name: Build native prompt (macOS)
        if: matrix.native_prompt == 'macos'
        run: cd native/macos && swift build -c release

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="bitsafe-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"

          # Core binaries
          cp target/${{ matrix.target }}/release/bitsafe "${ARCHIVE}/" 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bitsafe-service "${ARCHIVE}/" 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bitsafe-prompt "${ARCHIVE}/" 2>/dev/null || true

          # Native prompt (built for host architecture, not cross-compiled)
          if [ -f native/linux/target/release/bitsafe-prompt-linux ]; then
            cp native/linux/target/release/bitsafe-prompt-linux "${ARCHIVE}/"
          fi
          if [ -f native/macos/.build/release/bitsafe-prompt-macos ]; then
            cp native/macos/.build/release/bitsafe-prompt-macos "${ARCHIVE}/"
          fi

          # Service files
          cp -r contrib "${ARCHIVE}/"

          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            artifacts/**/*.tar.gz
